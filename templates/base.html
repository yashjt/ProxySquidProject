<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ProxyGuard{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: monospace;
            font-size: 13px;
            background-color: #0d0d0d;
            color: #cccccc;
            display: flex;
            min-height: 100vh;
        }

        a {
            color: #cccccc;
            text-decoration: none;
        }

        /* Sidebar */
        nav {
            width: 180px;
            background-color: #111111;
            border-right: 1px solid #222222;
            padding: 16px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
        }

        nav h2 {
            color: #ffffff;
            font-size: 13px;
            margin-bottom: 4px;
        }

        nav p {
            color: #444444;
            font-size: 11px;
            margin-bottom: 20px;
        }

        nav a {
            display: block;
            padding: 7px 8px;
            color: #555555;
            border-left: 2px solid transparent;
            margin-bottom: 2px;
        }

        nav a:hover {
            color: #cccccc;
        }

        nav a.active {
            color: #ffffff;
            border-left-color: #ffffff;
            background-color: #181818;
        }

        nav .status {
            position: absolute;
            bottom: 16px;
            font-size: 11px;
            color: #333333;
        }

        nav .status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #33aa33;
            border-radius: 50%;
            margin-right: 5px;
        }

        /* Main content area */
        main {
            margin-left: 180px;
            flex: 1;
            padding: 24px 28px;
        }

        /* Page heading */
        h1 {
            font-size: 16px;
            font-weight: normal;
            color: #eeeeee;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 11px;
            color: #444444;
            margin-bottom: 20px;
        }

        /* Layout grids */
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        /* Box / card component */
        .box {
            background-color: #111111;
            border: 1px solid #1e1e1e;
            padding: 14px;
            margin-bottom: 14px;
        }

        .box-title {
            font-size: 11px;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        /* Stat card */
        .stat {
            background-color: #111111;
            border: 1px solid #1e1e1e;
            padding: 14px;
        }

        .stat-label {
            font-size: 11px;
            color: #444444;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 26px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* Color helpers */
        .text-red   { color: #c0392b; }
        .text-green { color: #27ae60; }
        .text-white { color: #eeeeee; }
        .text-yellow { color: #c8910a; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            text-align: left;
            font-size: 11px;
            color: #444444;
            text-transform: uppercase;
            padding: 6px 8px;
            border-bottom: 1px solid #1e1e1e;
        }

        td {
            padding: 6px 8px;
            color: #aaaaaa;
            border-bottom: 1px solid #161616;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #141414;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-deny  { background-color: #2a0a0a; color: #c0392b; }
        .badge-allow { background-color: #0a1a0a; color: #27ae60; }
        .badge-cat   { background-color: #161616; color: #666666; }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .filter-bar input,
        .filter-bar select {
            background-color: #0d0d0d;
            border: 1px solid #222222;
            color: #cccccc;
            padding: 5px 8px;
            font-family: monospace;
            font-size: 12px;
            outline: none;
        }

        .filter-bar input { flex: 1; }

        /* Pagination */
        .pager {
            display: flex;
            gap: 4px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .pager button {
            background-color: #111111;
            border: 1px solid #222222;
            color: #555555;
            padding: 3px 9px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }

        .pager button:hover   { color: #cccccc; }
        .pager button:disabled { opacity: 0.3; cursor: default; }

        /* Horizontal bar chart */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 11px;
        }

        .bar-label {
            width: 120px;
            color: #aaaaaa;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .bar-track {
            flex: 1;
            height: 3px;
            background-color: #1e1e1e;
        }

        .bar-fill {
            height: 3px;
            background-color: #444444;
        }

        .bar-fill.danger { background-color: #6b1c1c; }

        .bar-count {
            width: 36px;
            text-align: right;
            color: #444444;
        }

        /* Live feed */
        #live-feed {
            height: 340px;
            overflow-y: auto;
        }

        .live-row {
            display: flex;
            gap: 10px;
            padding: 4px 0;
            border-bottom: 1px solid #161616;
            font-size: 11px;
        }

        .live-time   { width: 56px; flex-shrink: 0; color: #333333; }
        .live-domain { flex: 1; color: #999999; }
        .live-cat    { width: 100px; color: #444444; }

        /* Toggle switch */
        .toggle {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 17px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #222222;
            border-radius: 17px;
            transition: background-color 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 11px;
            width: 11px;
            left: 3px;
            bottom: 3px;
            background-color: #444444;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle input:checked + .toggle-slider {
            background-color: #3d1010;
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(15px);
            background-color: #c0392b;
        }

        /* Hourly bar chart */
        .hour-chart {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 60px;
        }

        .hbar-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            gap: 2px;
        }

        .hbar {
            width: 100%;
            min-height: 1px;
            background-color: #2a2a2a;
        }

        .hbar.has-blocked { background-color: #3d1010; }

        .hlabel {
            font-size: 8px;
            color: #333333;
        }
    </style>
</head>
<body>

<nav>
    <h2>ProxyGuard</h2>
    <p>URL Filter Dashboard</p>

    <a href="/"              class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
    <a href="/logs"          class="{% if request.path == '/logs' %}active{% endif %}">Request Logs</a>
    <a href="/uncategorized" class="{% if request.path == '/uncategorized' %}active{% endif %}">Uncategorized</a>
    <a href="/categories"    class="{% if request.path == '/categories' %}active{% endif %}">Categories</a>

    <div class="status">
        <span class="dot"></span>squid running
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
