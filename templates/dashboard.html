{% extends "base.html" %}
{% block title %}Dashboard — ProxyGuard{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Last 24 hours</div>
</div>

<!-- Stats -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value accent" id="stat-total">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Blocked</div>
        <div class="stat-value danger" id="stat-blocked">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Allowed</div>
        <div class="stat-value success" id="stat-allowed">—</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">DB Domains</div>
        <div class="stat-value warning" id="stat-db">—</div>
    </div>
</div>

<div class="grid-3">
    <!-- Hourly traffic chart -->
    <div class="card">
        <div class="card-title">Traffic — Last 24 Hours</div>
        <div class="hour-chart" id="hour-chart"></div>
    </div>

    <!-- Top blocked categories -->
    <div class="card">
        <div class="card-title">Top Blocked Categories</div>
        <div id="top-blocked"></div>
    </div>
</div>

<div class="grid-2">
    <!-- Top visited domains -->
    <div class="card">
        <div class="card-title">Top Allowed Domains Today</div>
        <div id="top-domains"></div>
    </div>

    <!-- Live feed -->
    <div class="card">
        <div class="card-title">
            ● Live Feed
            <span style="float:right; font-size:10px; color: var(--text-dim)" id="live-count">0 events</span>
        </div>
        <div id="live-feed"></div>
    </div>
</div>

<script>
let liveCount = 0;

async function loadStats() {
    const r = await fetch('/api/stats');
    const d = await r.json();

    document.getElementById('stat-total').textContent   = d.totals.total?.toLocaleString() ?? '0';
    document.getElementById('stat-blocked').textContent = d.totals.blocked?.toLocaleString() ?? '0';
    document.getElementById('stat-allowed').textContent = d.totals.allowed?.toLocaleString() ?? '0';
    document.getElementById('stat-db').textContent      = (d.db_size / 1_000_000).toFixed(1) + 'M';

    // Hourly chart
    const chart = document.getElementById('hour-chart');
    chart.innerHTML = '';
    const max = Math.max(...d.hourly.map(h => h.total), 1);
    d.hourly.forEach(h => {
        const wrap = document.createElement('div');
        wrap.className = 'hour-bar-wrap';
        const pct = Math.round((h.total / max) * 100);
        wrap.innerHTML = `
            <div class="hour-bar ${h.blocked > 0 ? 'has-blocked' : ''}" style="height:${pct}%"></div>
            <div class="hour-label">${h.hour}</div>
        `;
        wrap.title = `${h.hour}: ${h.total} total, ${h.blocked} blocked`;
        chart.appendChild(wrap);
    });

    // Top blocked
    const maxBlocked = Math.max(...d.top_blocked.map(c => c.count), 1);
    document.getElementById('top-blocked').innerHTML = d.top_blocked.map(c => `
        <div class="bar-row">
            <div class="bar-label">${c.category}</div>
            <div class="bar-track"><div class="bar-fill danger" style="width:${Math.round(c.count/maxBlocked*100)}%"></div></div>
            <div class="bar-count">${c.count}</div>
        </div>
    `).join('') || '<div style="color:var(--text-dim);font-size:12px;font-family:var(--mono)">No blocked requests today</div>';

    // Top domains
    const maxDom = Math.max(...d.top_domains.map(x => x.count), 1);
    document.getElementById('top-domains').innerHTML = d.top_domains.map(x => `
        <div class="bar-row">
            <div class="bar-label">${x.domain}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(x.count/maxDom*100)}%"></div></div>
            <div class="bar-count">${x.count}</div>
        </div>
    `).join('') || '<div style="color:var(--text-dim);font-size:12px;font-family:var(--mono)">No data yet</div>';
}

// Live SSE feed
const feed = document.getElementById('live-feed');
const evtSource = new EventSource('/api/live');
evtSource.onmessage = e => {
    const row = JSON.parse(e.data);
    if (row.error) return;
    liveCount++;
    document.getElementById('live-count').textContent = liveCount + ' events';
    const div = document.createElement('div');
    div.className = 'live-row';
    div.innerHTML = `
        <span class="live-time">${row.logged_at}</span>
        <span class="badge ${row.action === 'DENY' ? 'badge-deny' : 'badge-allow'}">${row.action}</span>
        <span class="live-domain">${row.domain}</span>
        <span class="live-cat">${row.category || '—'}</span>
    `;
    feed.insertBefore(div, feed.firstChild);
    if (feed.children.length > 100) feed.removeChild(feed.lastChild);
};

loadStats();
setInterval(loadStats, 30000);
</script>
{% endblock %}
